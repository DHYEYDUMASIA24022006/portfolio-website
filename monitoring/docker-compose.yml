version: '3.8'

services:

  graphite:
    image: graphiteapp/graphite-statsd
    container_name: graphite
    ports:
      - "80:80"
      - "2003:2003"
      - "8125:8125/udp"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - graphite

  nagios:
    image: jasonrivers/nagios
    container_name: nagios
    ports:
      - "8081:80"
    restart: unless-stopped